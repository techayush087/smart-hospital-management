<div class="form-field form-field--checkbox">
  <label class="form-field__checkbox-label" [attr.for]="fieldKey()">
    <input
      class="form-field__checkbox"
      type="checkbox"
      [id]="fieldKey()"
      [attr.data-cy]="fieldKey()"
      [attr.aria-describedby]="showError() ? fieldKey() + '-error' : null"
      [formControl]="control()" />
    <span class="form-field__checkbox-text">{{ label() }}</span>
  </label>

  @if (showError()) {
    <span class="form-field__error" [id]="fieldKey() + '-error'">
      <span class="material-icons-round" aria-hidden="true">error</span>
      {{ errorMessage() }}
    </span>
  }
</div>
