<div class="form-field form-field--textarea">
  <textarea
    class="form-field__input form-field__input--textarea"
    rows="3"
    placeholder=" "
    [id]="fieldKey()"
    [attr.data-cy]="fieldKey()"
    [formControl]="control()"></textarea>
  <label class="form-field__label" [attr.for]="fieldKey()">{{ label() }}</label>

  @if (showError()) {
    <span class="form-field__error">
      <span class="material-icons-round" aria-hidden="true">error</span>
      {{ errorMessage() }}
    </span>
  }
</div>
