<div class="form-field">
  <input
    class="form-field__input"
    type="text"
    placeholder=" "
    [id]="fieldKey()"
    [attr.data-cy]="fieldKey()"
    [formControl]="control()" />
  <label class="form-field__label" [attr.for]="fieldKey()">{{ label() }}</label>

  @if (showError()) {
    <span class="form-field__error">
      <span class="material-icons-round" aria-hidden="true">error</span>
      {{ errorMessage() }}
    </span>
  }
</div>
