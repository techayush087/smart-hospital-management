<div class="form-field form-field--date">
  <label class="form-field__label form-field__label--static" [attr.for]="fieldKey()">
    {{ label() }}
  </label>
  <app-date-picker
    [formControl]="control()"
    [dataCy]="fieldKey()"
    placeholder="Select a date" />

  @if (showError()) {
    <span class="form-field__error" [id]="fieldKey() + '-error'">
      <span class="material-icons-round" aria-hidden="true">error</span>
      {{ errorMessage() }}
    </span>
  }
</div>
