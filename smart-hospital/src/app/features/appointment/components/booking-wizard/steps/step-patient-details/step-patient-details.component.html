<section class="step-patient-details" data-cy="step-patient-details">
  @if (selectedSlot(); as slot) {
    <div class="step-patient-details__summary">
      <span class="step-patient-details__summary-label">Selected slot</span>
      <span class="step-patient-details__summary-value">
        {{ slot.startTime | timeSlot: slot.endTime }}
      </span>
    </div>
  }

  <app-dynamic-form [config]="config" [form]="form()" />
</section>
