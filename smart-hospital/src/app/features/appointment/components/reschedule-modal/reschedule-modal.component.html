<app-modal
  [open]="open()"
  [title]="'Reschedule Appointment'"
  (closed)="onClose()">
  <div class="reschedule-modal" data-cy="reschedule-modal">
    <label class="reschedule-modal__field">
      <span class="reschedule-modal__label">Choose a new date</span>
      <input
        type="date"
        class="reschedule-modal__date"
        data-cy="reschedule-date"
        [value]="selectedDate()"
        (change)="onDateChange($any($event.target).value)" />
    </label>

    @if (slotsLoading()) {
      <div class="reschedule-modal__grid">
        @for (s of [0, 1, 2, 3, 4, 5]; track s) {
          <div class="reschedule-modal__slot reschedule-modal__slot--skeleton"></div>
        }
      </div>
    } @else if (selectedDate() && slots().length === 0) {
      <p class="reschedule-modal__empty">No slots available for this date.</p>
    } @else if (slots().length > 0) {
      <div class="reschedule-modal__grid">
        @for (slot of slots(); track slot.id) {
          <button
            type="button"
            data-cy="reschedule-slot"
            class="reschedule-modal__slot"
            [class.reschedule-modal__slot--available]="slot.isAvailable"
            [class.reschedule-modal__slot--selected]="selectedSlot()?.id === slot.id"
            [class.reschedule-modal__slot--unavailable]="!slot.isAvailable"
            [disabled]="!slot.isAvailable"
            (click)="onSelectSlot(slot)">
            {{ slot.startTime | timeSlot: slot.endTime }}
          </button>
        }
      </div>
    } @else {
      <p class="reschedule-modal__empty">Select a date to see available slots.</p>
    }

    <div class="reschedule-modal__actions">
      <app-button
        label="Cancel"
        variant="ghost"
        (clicked)="onClose()" />
      <app-button
        label="Confirm Reschedule"
        variant="primary"
        [disabled]="!selectedSlot()"
        data-cy="reschedule-confirm"
        (clicked)="onConfirm()" />
    </div>
  </div>
</app-modal>
