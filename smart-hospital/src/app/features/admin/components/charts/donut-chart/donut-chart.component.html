@if (isEmpty()) {
  <p class="donut__empty">No distribution data available.</p>
} @else {
  <div class="donut">
    <svg
      class="donut__svg"
      viewBox="0 0 100 100"
      role="img"
      aria-label="Specialty distribution donut chart"
    >
      <g transform="rotate(-90 50 50)">
        @for (slice of slices(); track slice.specialization) {
          <circle
            class="donut__slice donut__slice--{{ slice.colorIndex }}"
            cx="50"
            cy="50"
            [attr.r]="radius"
            [attr.stroke-dasharray]="slice.dashArray"
            [attr.stroke-dashoffset]="slice.dashOffset"
          />
        }
      </g>
    </svg>
    <ul class="donut__legend">
      @for (slice of slices(); track slice.specialization) {
        <li class="donut__legend-item">
          <span class="donut__swatch donut__swatch--{{ slice.colorIndex }}"></span>
          <span class="donut__legend-label">{{ slice.specialization }}</span>
          <span class="donut__legend-count">{{ slice.count }}</span>
        </li>
      }
    </ul>
  </div>
}
