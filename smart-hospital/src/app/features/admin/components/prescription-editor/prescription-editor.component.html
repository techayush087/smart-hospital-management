<app-page-header
  title="New Prescription"
  [breadcrumbs]="['Admin', 'Prescriptions']" />

<form class="rx-editor" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  @if (savedMessage()) {
    <div class="rx-editor__banner" role="status" data-cy="rx-saved">
      <span class="material-icons-round" aria-hidden="true">check_circle</span>
      {{ savedMessage() }}
    </div>
  }

  <section class="rx-editor__card">
    <h2 class="rx-editor__section-title">Patient & details</h2>

    <div class="form-field">
      <label class="form-field__label" for="rx-patient">Patient</label>
      <select id="rx-patient" class="form-field__select" formControlName="patientId" data-cy="rx-patient">
        <option value="" disabled>Select a patient</option>
        @for (p of patients(); track p.id) {
          <option [value]="p.id">{{ p.fullName }} — {{ p.email }}</option>
        }
      </select>
    </div>

    <div class="form-field">
      <label class="form-field__label" for="rx-doctor">Prescribing doctor</label>
      <select id="rx-doctor" class="form-field__select" formControlName="doctorId" data-cy="rx-doctor">
        <option value="" disabled>Select a doctor</option>
        @for (d of doctors(); track d.id) {
          <option [value]="d.id">{{ d.name }} — {{ d.specialization }}</option>
        }
      </select>
    </div>

    <div class="form-field">
      <label class="form-field__label" for="rx-instructions">Instructions</label>
      <textarea
        id="rx-instructions"
        class="form-field__textarea"
        formControlName="instructions"
        placeholder="e.g. Take with food. Complete the full course."
        data-cy="rx-instructions"></textarea>
    </div>

    <div class="form-field">
      <label class="form-field__label">Valid until (optional)</label>
      <app-date-picker formControlName="validUntil" [min]="today" placeholder="Select an expiry date" />
    </div>
  </section>

  <section class="rx-editor__card">
    <div class="rx-editor__meds-head">
      <h2 class="rx-editor__section-title">Medications</h2>
      <app-button label="Add medication" variant="secondary" size="sm" (clicked)="addMedication()" data-cy="rx-add-med" />
    </div>

    <div class="rx-meds" formArrayName="medications">
      @for (med of medications.controls; track $index) {
        <div class="rx-med" [formGroupName]="$index">
          <div class="rx-med__grid">
            <div class="form-field">
              <label class="form-field__label">Name</label>
              <input class="form-field__input" type="text" formControlName="name" placeholder="e.g. Amoxicillin" />
            </div>
            <div class="form-field">
              <label class="form-field__label">Dosage</label>
              <input class="form-field__input" type="text" formControlName="dosage" placeholder="e.g. 500mg" />
            </div>
            <div class="form-field">
              <label class="form-field__label">Frequency</label>
              <input class="form-field__input" type="text" formControlName="frequency" placeholder="e.g. Twice daily" />
            </div>
            <div class="form-field">
              <label class="form-field__label">Duration</label>
              <input class="form-field__input" type="text" formControlName="duration" placeholder="e.g. 7 days" />
            </div>
          </div>
          @if (medications.length > 1) {
            <button type="button" class="rx-med__remove" aria-label="Remove medication" (click)="removeMedication($index)">
              <span class="material-icons-round" aria-hidden="true">delete</span>
            </button>
          }
        </div>
      }
    </div>
  </section>

  <div class="rx-editor__actions">
    <app-button
      label="Save prescription"
      variant="primary"
      size="lg"
      type="submit"
      [loading]="loading()"
      data-cy="rx-save" />
  </div>
</form>
